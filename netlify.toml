[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Public, client-embedded values (not secrets), excluded from secrets scanning:
  #  - NEON_AUTH_ORIGIN: the public site URL (also in OpenGraph metadata)
  #  - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: a publishable Maps JS key (restrict by referrer)
  SECRETS_SCAN_OMIT_KEYS = "NEON_AUTH_ORIGIN,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY"

# Enables SSR, the App Router, and the API routes under app/api/ on Netlify.
[[plugins]]
  package = "@netlify/plugin-nextjs"
